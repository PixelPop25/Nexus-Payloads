name: Update Manifest JSON

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Luac0re/**'
      - 'Y2jb/**'
      - 'Payloads/**'
      - '.github/workflows/update-manifest.yml'
      - '.github/scripts/generate_manifest.py'   # Added this
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Luac0re/**'
      - 'Y2jb/**'
      - 'Payloads/**'
  workflow_dispatch:

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify script exists
        run: |
          echo "📂 Checking files..."
          ls -la .github/scripts/
          ls -la .github/
          if [ ! -f .github/scripts/generate_manifest.py ]; then
            echo "❌ ERROR: generate_manifest.py not found!"
            exit 1
          else
            echo "✅ generate_manifest.py found"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate manifest.json
        run: python .github/scripts/generate_manifest.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet manifest.json; then
            echo "No changes to manifest.json"
          else
            git add manifest.json
            git commit -m "chore: auto-update manifest.json"
            git push
          fi
